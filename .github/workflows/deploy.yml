name: Integrar ChemMaster a SPECT

on:
  workflow_dispatch: # Se activa manualmente con el botón en Actions

jobs:
  sync-to-parent:
    runs-on: ubuntu-latest
    steps:
      # 1. Descargar el código del HIJO (Fuente)
      - name: Checkout Child Repo (TCU.MEP)
        uses: actions/checkout@v4
        with:
          path: child-repo

      # 2. Descargar el código del PADRE (Destino)
      - name: Checkout Parent Repo (SPECT)
        uses: actions/checkout@v4
        with:
          repository: spectcr/spectcr.com
          token: ${{ secrets.DEPLOY_TOKEN }}
          path: parent-repo
          ref: main

      # 3. Sincronizar BACKEND (API)
      - name: Sync Backend (API)
        run: |
          echo "🧪 Sincronizando API PHP..."
          # -a: archive, -v: verbose, --delete: borra en destino lo que no exista en origen
          rsync -av --delete --exclude 'Config/development.ini' child-repo/API/ChemMaster/ parent-repo/API/ChemMaster/

      # 4. Sincronizar FRONTEND (Carpetas Clave)
      - name: Sync Frontend Directories
        run: |
          echo "⚛️ Sincronizando Frontend React..."
          
          # Ruta base en el padre
          DEST_BASE="parent-repo/SPECT-Website/src/ChemMaster"
          
          # Lista de carpetas a copiar
          FOLDERS=("assets" "components" "context" "hooks" "lib" "pages" "types")

          for folder in "${FOLDERS[@]}"; do
            src="child-repo/chemmaster-app/src/$folder/"
            dest="$DEST_BASE/$folder/"
            
            # Verificamos si la carpeta existe en el hijo antes de copiar
            if [ -d "$src" ]; then
              echo "✅ Procesando: $folder"
              mkdir -p "$dest"
              rsync -av --delete "$src" "$dest"
            else
              echo "⚠️ Saltando: $folder (No existe en el origen)"
            fi
          done

      # 4.1 Sincronizar App.tsx
      - name: Sync App.tsx
        run: |
          echo "⚛️ Sincronizando App.tsx..."
          
          src="child-repo/chemmaster-app/src/App.tsx"
          dest="parent-repo/SPECT-Website/src/ChemMaster/App.tsx"
          
          if [ -f "$src" ]; then
            echo "✅ Copiando: App.tsx"
            mkdir -p "$(dirname "$dest")"
            cp "$src" "$dest"
          else
            echo "⚠️ App.tsx no encontrado en el origen"
          fi

      # 5. Guardar cambios en el PADRE
      - name: Commit and Push to Parent
        run: |
          cd parent-repo
          
          # Configurar identidad del bot para este commit
          git config user.name "ChemMaster Bot"
          git config user.email "bot@spectcr.com"
          
          # Verificar si hubo cambios reales
          if [[ -n $(git status -s) ]]; then
            git add .
            git commit -m "feat(integration): Actualización automática desde ChemMaster App"
            git push origin main
            echo "🚀 ÉXITO: Cambios subidos correctamente al repositorio Padre."
          else
            echo "✨ NADA QUE HACER: Todo está sincronizado."
          fi